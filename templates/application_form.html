<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>【GLS】第{{ bond_number }}回普通社債申込書</title>

  <style>
    @page {
      size: A4;
      margin: 0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS Mincho", serif;
    }

    .bond-page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 30mm 26mm 24mm;
      background: #fff;
    }

    .bond-header {
      text-align: center;
      margin-bottom: 8mm;
    }

    .bond-company-name {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 3mm;
    }

    .bond-document-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1.35;
    }

    .bond-recipient {
      width: 100%;
      margin-bottom: 8mm;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.7;
    }

    .bond-recipient-text {
      display: inline-block;
      min-width: 118mm;
      padding-bottom: 1mm;
      border-bottom: 1px solid #111;
    }

    .bond-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.4;
      margin-bottom: 14mm;
    }

    .bond-amount-box {
      width: 140mm;
      margin: 0 auto 4mm;
      display: grid;
      grid-template-columns: 26mm 1fr 12mm;
      align-items: end;
      column-gap: 3mm;
      font-weight: 700;
    }

    .bond-amount-label {
      font-size: 24px;
      line-height: 1.2;
    }

    .bond-amount-value {
      min-height: 10mm;
      border-bottom: 2px solid #111;
      text-align: right;
      padding-right: 4mm;
      font-size: 24px;
      line-height: 1.15;
    }

    .bond-yen {
      font-size: 24px;
      line-height: 1.2;
    }

    .bond-unit {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 14mm;
    }

    .bond-unit-value {
      display: inline-block;
      min-width: 24mm;
      border-bottom: 1.5px solid #111;
      text-align: center;
      padding: 0 2mm;
    }

    .bond-statement-row {
      display: grid;
      grid-template-columns: 1fr 58mm;
      align-items: end;
      margin-bottom: 14mm;
      column-gap: 8mm;
    }

    .bond-statement {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.8;
    }

    .bond-date {
      text-align: right;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.8;
    }

    .bond-form-area {
      margin-top: 4mm;
    }

    .bond-field {
      margin-bottom: 12mm;
    }

    .bond-field-label {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 2mm;
    }

    .bond-line {
      width: 100%;
      min-height: 10mm;
      border-bottom: 1.5px solid #111;
      padding: 0 1mm 2mm;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.7;
      display: flex;
      align-items: flex-end;
    }

    .bond-postal-line {
      width: 44mm;
      min-height: 9mm;
      border-bottom: 1.5px solid #111;
      padding: 0 1mm 2mm;
      margin-top: 1mm;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.7;
      display: flex;
      align-items: flex-end;
    }

    @media print {
      body {
        background: #fff;
      }

      .bond-page {
        margin: 0;
      }
    }
  </style>
</head>

<body>
  <main class="bond-page">

    <header class="bond-header">
      <div class="bond-company-name">
        {{ issuer_company_name }}
      </div>
      <div class="bond-document-title">
        普通社債申込書
      </div>
    </header>

    <section class="bond-recipient">
      <span class="bond-recipient-text">
        {{ issuer_company_name }} 御中
      </span>
    </section>

    <section class="bond-title">
      第{{ bond_number }}回普通社債
    </section>

    <section class="bond-amount-box">
      <div class="bond-amount-label">額面</div>
      <div class="bond-amount-value">{{ face_amount }}</div>
      <div class="bond-yen">円</div>
    </section>

    <section class="bond-unit">
      （1口1,000万円につき <span class="bond-unit-value">{{ unit_count }}</span> 口）
    </section>

    <section class="bond-statement-row">
      <div class="bond-statement">
        募集要項承諾の上、申込致します。
      </div>
      <div class="bond-date">
        {{ application_date }}
      </div>
    </section>

    <section class="bond-form-area">
      <div class="bond-field">
        <div class="bond-field-label">住所　（郵便番号マーク）</div>
        <div class="bond-line">
          {{ applicant_address_line_1 }}
        </div>
        <div class="bond-postal-line">
          {{ applicant_address_line_2 }}
        </div>
      </div>

      <div class="bond-field">
        <div class="bond-field-label">申込人氏名</div>
        <div class="bond-line">
          {{ applicant_name }}
        </div>
      </div>
    </section>

  </main>
</body>
</html>
